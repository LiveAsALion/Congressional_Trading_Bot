name: Congressional Trading Bot

on:
  schedule:
    # Runs at 9:30 AM EST (14:30 UTC), Monday through Friday
    - cron: '30 14 * * 1-5'
  workflow_dispatch:
    # Manual UI Trigger via GitHub Actions Tab
    inputs:
      manual_buys:
        description: 'Tickers to screen for BUY (e.g. NVDA,AAPL)'
        required: false
        default: ''
      manual_sales:
        description: 'Tickers to FORCE SELL (e.g. TSLA)'
        required: false
        default: ''
  # Trigger for your Telegram Bridge (Repository Dispatch)
  repository_dispatch:
    types: [telegram_trigger]

permissions:
  contents: write # Required to update trades_log.csv

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # FIX: This installs everything in your requirements.txt including apify-client
          pip install -r requirements.txt

      - name: Run Trading Bot
        env:
          # API Keys from GitHub Secrets
          APCA_KEY: ${{ secrets.APCA_KEY }}
          APCA_SECRET: ${{ secrets.APCA_SECRET }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Logic to handle Manual UI inputs OR Telegram Bridge inputs
          MANUAL_BUYS: ${{ github.event.inputs.manual_buys || github.event.client_payload.ticker }}
          MANUAL_SALES: ${{ github.event.inputs.manual_sales }}
        run: python bot.py

      - name: Commit and Push Trade Log
        run: |
          git config --global user.name "Congress-Bot"
          git config --global user.email "bot@actions.github.com"
          git add trades_log.csv
          # Only commits if there are actual changes (new trades) to the log
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update history [skip ci]" && git push)
