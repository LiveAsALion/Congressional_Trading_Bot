name: Congressional Trading Bot
on:
  schedule:
    - cron: '30 14 * * 1-5' # 9:30 AM EST, Mon-Fri
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install alpaca-trade-api yfinance pandas requests
      - name: Run Bot
        env:
          APCA_KEY: ${{ secrets.APCA_KEY }}
          APCA_SECRET: ${{ secrets.APCA_SECRET }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py
