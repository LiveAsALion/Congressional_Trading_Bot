name: Congressional Trading Bot
on:
  schedule:
    - cron: '30 14 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Run Bot
        env:
          APCA_KEY: ${{ secrets.APCA_KEY }}
          APCA_SECRET: ${{ secrets.APCA_SECRET }}
          FMP_TOKEN: ${{ secrets.FMP_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py
      - name: Commit Log
        run: |
          git config --global user.name "Congress-Bot"
          git config --global user.email "bot@actions.github.com"
          git add trades_log.csv
          git commit -m "Update history [skip ci]" || echo "No changes"
          git push
